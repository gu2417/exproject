<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px 'Malgun Gothic', 'Noto Sans CJK KR', Arial, sans-serif; fill: #172033; }
      .sub { font: 400 18px 'Malgun Gothic', 'Noto Sans CJK KR', Arial, sans-serif; fill: #5b6475; }
      .box-title { font: 700 22px 'Malgun Gothic', 'Noto Sans CJK KR', Arial, sans-serif; fill: #172033; }
      .text { font: 400 17px 'Malgun Gothic', 'Noto Sans CJK KR', Arial, sans-serif; fill: #263044; }
      .small { font: 400 15px 'Malgun Gothic', 'Noto Sans CJK KR', Arial, sans-serif; fill: #4c566a; }
      .chip { font: 600 14px 'Malgun Gothic', 'Noto Sans CJK KR', Arial, sans-serif; fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #d8deea; stroke-width: 2; rx: 10; }
      .inner { fill: #f9fbff; stroke: #e0e6f1; stroke-width: 1.5; rx: 8; }
      .client { fill: #eaf3ff; stroke: #8bb8ee; }
      .server { fill: #ebf8f1; stroke: #8acba5; }
      .common { fill: #fff7e8; stroke: #e7ba64; }
      .data { fill: #f6edff; stroke: #bd95e6; }
      .arrow { stroke: #526179; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow2 { stroke: #2676c9; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .arrow3 { stroke: #2f8f59; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .label-blue { font: 700 15px 'Malgun Gothic', 'Noto Sans CJK KR', Arial, sans-serif; fill: #2676c9; }
      .label-green { font: 700 15px 'Malgun Gothic', 'Noto Sans CJK KR', Arial, sans-serif; fill: #2f8f59; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#526179"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2676c9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f8f59"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>
  <text class="title" x="70" y="70">시스템 전체 구조도</text>
  <text class="sub" x="70" y="104">콘솔 클라이언트와 TCP 서버가 요청/응답 패킷을 주고받는 구조입니다.</text>

  <rect class="panel client" x="70" y="155" width="360" height="440"/>
  <text class="box-title" x="100" y="198">클라이언트 영역</text>
  <rect class="inner" x="100" y="225" width="300" height="62"/>
  <text class="text" x="122" y="260">menu.c</text>
  <text class="small" x="122" y="282">메뉴 출력, 사용자 입력 처리</text>
  <rect class="inner" x="100" y="305" width="300" height="62"/>
  <text class="text" x="122" y="340">client_net.c</text>
  <text class="small" x="122" y="362">서버 접속, 요청 송신, 응답 수신</text>
  <rect class="inner" x="100" y="385" width="300" height="62"/>
  <text class="text" x="122" y="420">result_viewer.c</text>
  <text class="small" x="122" y="442">응답 파싱, 검색 결과 화면 출력</text>
  <rect class="inner" x="100" y="465" width="300" height="82"/>
  <text class="text" x="122" y="500">favorite.c / recent_search.c</text>
  <text class="small" x="122" y="522">즐겨찾기, 최근 검색 요청 생성</text>

  <rect class="panel server" x="535" y="155" width="440" height="440"/>
  <text class="box-title" x="565" y="198">서버 영역</text>
  <rect class="inner" x="565" y="225" width="350" height="58"/>
  <text class="text" x="587" y="258">server.c</text>
  <text class="small" x="587" y="280">포트 개방, 클라이언트 접속 대기</text>
  <rect class="inner" x="565" y="298" width="350" height="58"/>
  <text class="text" x="587" y="331">client_handler.c</text>
  <text class="small" x="587" y="353">요청 수신, 응답 전송, 접속 로그 기록</text>
  <rect class="inner" x="565" y="371" width="350" height="58"/>
  <text class="text" x="587" y="404">router.c</text>
  <text class="small" x="587" y="426">패킷 종류별 서비스 함수 분기</text>
  <rect class="inner" x="565" y="444" width="350" height="103"/>
  <text class="text" x="587" y="477">서비스 모듈</text>
  <text class="small" x="587" y="501">검색, 길찾기, 편의시설, 운행 정보</text>
  <text class="small" x="587" y="526">즐겨찾기, 최근 검색 처리</text>

  <path class="arrow2" d="M430 305 C475 305 490 305 535 305"/>
  <text class="label-blue" x="454" y="286">요청 패킷</text>
  <path class="arrow3" d="M535 370 C490 370 475 370 430 370"/>
  <text class="label-green" x="454" y="397">응답 패킷</text>

  <rect class="panel data" x="1060" y="155" width="270" height="440"/>
  <text class="box-title" x="1090" y="198">데이터 영역</text>
  <rect class="inner" x="1090" y="225" width="210" height="98"/>
  <text class="text" x="1110" y="258">CSV 원본</text>
  <text class="small" x="1110" y="282">정류장, 노선, 역, 시설</text>
  <text class="small" x="1110" y="304">도착 시간, 혼잡도</text>
  <rect class="inner" x="1090" y="350" width="210" height="86"/>
  <text class="text" x="1110" y="383">사용자 저장 파일</text>
  <text class="small" x="1110" y="407">favorites.txt</text>
  <text class="small" x="1110" y="429">recent_search.txt</text>
  <rect class="inner" x="1090" y="462" width="210" height="62"/>
  <text class="text" x="1110" y="497">logs</text>
  <text class="small" x="1110" y="519">접속, 처리, 오류 기록</text>

  <path class="arrow" d="M975 300 C1018 300 1018 275 1060 275"/>
  <path class="arrow" d="M975 420 C1018 420 1018 395 1060 395"/>
  <path class="arrow" d="M975 500 C1018 500 1018 493 1060 493"/>

  <rect class="panel common" x="70" y="675" width="1260" height="125"/>
  <text class="box-title" x="100" y="718">공통 모듈</text>
  <rect x="260" y="695" width="140" height="40" rx="20" fill="#d99628"/>
  <text class="chip" x="290" y="721">protocol.h</text>
  <rect x="420" y="695" width="120" height="40" rx="20" fill="#d99628"/>
  <text class="chip" x="459" y="721">types.h</text>
  <rect x="560" y="695" width="155" height="40" rx="20" fill="#d99628"/>
  <text class="chip" x="590" y="721">string_utils</text>
  <rect x="735" y="695" width="140" height="40" rx="20" fill="#d99628"/>
  <text class="chip" x="762" y="721">csv_parser</text>
  <rect x="895" y="695" width="115" height="40" rx="20" fill="#d99628"/>
  <text class="chip" x="930" y="721">graph</text>
  <rect x="1030" y="695" width="155" height="40" rx="20" fill="#d99628"/>
  <text class="chip" x="1058" y="721">linked_list</text>
  <text class="small" x="100" y="765">클라이언트와 서버가 함께 사용하는 통신 규칙, 자료형, 문자열 처리, CSV 파싱, 그래프 탐색 기능을 모아 둔 영역입니다.</text>
</svg>
